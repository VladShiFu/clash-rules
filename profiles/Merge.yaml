proxy-groups:
- name: Standart RU
  type: fallback
  icon: https://www.vectorlogo.zone/logos/cloudflare/cloudflare-icon.svg
  proxies:
    - "Стандартный 1"
    - "Стандартный 2"
    - "Стандартный 3"
    # - DIRECT
  url: 'http://speed.cloudflare.com/'
  interval: 300
- name: Geohide DNS
  type: fallback
  icon: https://www.vectorlogo.zone/logos/ghostery/ghostery-icon.svg
  proxies:
    - dns geohide
    - dns xbox
    # - DIRECT
  url: 'http://speed.cloudflare.com/'
  interval: 300
- name: llimonix
  type: fallback
  icon: https://www.vectorlogo.zone/logos/linode/linode-icon.svg
  proxies:
    - "🇫🇮 FI"
    - "🇳🇱 NL"
    - "🇵🇱 PL"
    - "🇪🇪 EE"
    - "🇺🇸 US"
    # - DIRECT
  url: 'http://speed.cloudflare.com/'
  interval: 300
- name: Proton
  type: fallback
  icon: https://res.cloudinary.com/dbulfrlrz/image/upload/v1703162849/static/logos/icons/vpn_f9embt.svg
  proxies:
