# =============================================================================
# PROXY GROUPS
# =============================================================================
group-common: &group-common
  url: 'https://www.gstatic.com/generate_204'
  interval: 300
  timeout: 3000
  max-failed-times: 2
  type: url-test
  tolerance: 80

proxy-groups:

  - name: Standart RU
    <<: *group-common
    icon: https://www.vectorlogo.zone/logos/cloudflare/cloudflare-icon.svg
    proxies:
      - "Стандартный 1"
      - "Стандартный 2"
      - "Стандартный 3"
      # - DIRECT

  - name: Geohide DNS
    <<: *group-common
    icon: https://www.vectorlogo.zone/logos/ghostery/ghostery-icon.svg
    proxies:
      - "dns geohide"
      - "dns xbox"
      # - DIRECT

  - name: llimonix
    <<: *group-common
    icon: htt[hidden]vg
    proxies:
      - "🇫🇮 FI"
      - "🇳🇱 NL"
      - "🇵🇱 PL"
      - "🇪🇪 EE"
      - "🇺🇸 US"
