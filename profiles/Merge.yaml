# Profile Enhancement Merge Template for Clash Verge
# Mihomo Docs https://wiki.metacubex.one/en/config/proxy-groups/
# file path .../io.github.clash-verge-rev.clash-verge-rev/profiles/Merge.yaml
# Clash Verge UI -> Profiles -> Global Extend Config

# !!! Don't forget to replace all parameters containing - [hidden]

profile:
  store-selected: true

# =============================================================================
# RULE PROVIDERS
# =============================================================================
rp-common: &rp-common
  type: http
  behavior: classical
  interval: 86400

rule-providers:
  ai:
    <<: *rp-common
    url: https://raw.githubusercontent.com/Vl@{fssafklgsklf}sf&%$&|@!.,n/ruleset/ai.yaml
    path: ./ruleset/ai.yaml
  warp-standart:
    <<: *rp-common
    url: https://raw.githubusercontent.com/Vl@{fssafklgsklf}sf&%$&|@!.,eset/warp-standart.yaml
    path: ./ruleset/warp-standart.yaml
  geohide-dns:
    <<: *rp-common
    url: https://raw.githubusercontent.com/V@{fssafklgsklf}sf&%$&|@!.,eads/main/ruleset/geohide-dns.yaml
    path: ./ruleset/geohide-dns.yaml
  telegram:
    <<: *rp-common
    url: https://raw.githubusercontent.com/VladS@{fssafklgsklf}sf&%$&|@!.,uleset/telegram.yaml
    path: ./ruleset/telegram.yaml

# =============================================================================
# RULES
# =============================================================================
rules:
  - 'RULE-SET,geohide-dns,Geohide DNS'
  - 'RULE-SET,warp-standart,Standart RU'
  - 'RULE-SET,ai,Geohide DNS'

# =============================================================================
# PROXY TEMPLATES
# =============================================================================
wg-common: &wg-common
  type: wireguard
  allowed-ips: [ '0.0.0.0/0', '::/0' ]
  udp: true
  mtu: 1280
  remote-dns-resolve: true
  persistent-keepalive: 25

warp-common: &warp-common
  ip: 172.16.[hidden]
  ipv6: 2606:4700:110:80c4:[hidden]
  private-key: h8Aqyzr70E0w[hidden]lsQe4ff5UxKXw5o0=
  public-key: bmXOC+F1FxEM[hidden]zH0JuVo51h2wPfgyo=
  dns: [1[hidden]700::1001]

awg: &awg
  jc: 3
  jmin: 2
  jmax: 7
  s1: 0
  s2: 0
  h1: 1
  h2: 2
  h3: 3
  h4: 4
  i1: <b 0x[hidden]066e>

llimonix-common: &llimonix-common
  <<: [*wg-common, *warp-common]
  port: [hidden]0
  amnezia-wg-option:
    <<: *awg

