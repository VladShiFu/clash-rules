# Profile Enhancement Merge Template for Clash Verge

profile:
  store-selected: true
  
rule-providers:
  ai:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/VladShiFu/clash-rules/refs/heads/main/ruleset/ai.yaml
    interval: 86400
    path: ./ruleset/ai.yaml
  warp-standart:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/VladShiFu/clash-rules/refs/heads/main/ruleset/warp-standart.yaml
    interval: 86400
    path: ./ruleset/warp-standart.yaml
  geohide-dns:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/VladShiFu/clash-rules/refs/heads/main/ruleset/geohide-dns.yaml
    interval: 86400
    path: ./ruleset/geohide-dns.yaml
  foreign:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/VladShiFu/clash-rules/refs/heads/main/ruleset/foreign.yaml
    interval: 86400
    path: ./ruleset/foreign.yaml

rules:
  - 'RULE-SET,geohide-dns,Geohide DNS'
  - 'RULE-SET,warp-standart,Standart RU'
  - 'RULE-SET,ai,Geohide DNS'

warp-common: &warp-common
  type: wireguard
  ip:  
  ipv6:  
  private-key:  
  public-key:  
  allowed-ips: ['0.0.0.0/0']
  udp: true
  mtu: 1280
  remote-dns-resolve: true
  dns: [1.1.1.1, 1.0.0.1, 2606:4700:4700::1111, 2606:4700:4700::1001]

awg: &awg
  amnezia-wg-option:
   jc: 3
   jmin: 2
   jmax: 7
   s1: 0
   s2: 0
   h1: 1
   h2: 2
   h4: 3
   h3: 4  
   i1: 
  
proxies:
- name: "Стандартный 1"
  <<: *warp-common
  server:  
  port:  
  amnezia-wg-option:
   jc: 3
   jmin: 2
   jmax: 7
   s1: 0
   s2: 0
   h1: 1
   h2: 2
   h4: 3
   h3: 4  
   i1: <b 0xce00000...>
- name: "Стандартный 2"
  <<: *warp-common
  server: 
  port: 
